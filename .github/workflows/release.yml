name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: app-linux
          - os: macos-latest
            asset_name: app-macos
          - os: windows-latest
            asset_name: app-windows.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Frontend Dependencies & Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Backend with PyInstaller (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: ./backend
        run: |
          pyinstaller --name ${{ matrix.asset_name }} --onefile --add-data "static:static" main.py

      - name: Build Backend with PyInstaller (Windows)
        if: runner.os == 'Windows'
        working-directory: ./backend
        run: |
          pyinstaller --name ${{ matrix.asset_name }} --onefile --add-data "static;static" main.py

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./backend/dist/${{ matrix.asset_name }}
